<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Flash</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== NEXUS DESIGN SYSTEM (tokens) ===== */
:root {
  --bg:#0D1B2E; --panel:#152238; --panel-2:#1C2E45; --panel-3:#243650; --line:#2A3F5A;
  --grad:linear-gradient(135deg,#22D3EE 0%,#3B82F6 100%);
  --grad-glow:rgba(34,211,238,0.38);
  --accent:#3B82F6; --accent-bright:#60A5FA; --accent-dim:rgba(59,130,246,0.14);
  --text:#FFFFFF; --text-dim:rgba(255,255,255,0.70); --muted:#94A3B8;
  --green:#10B981; --green-dim:rgba(16,185,129,0.14);
  --red:#EF4444; --red-dim:rgba(239,68,68,0.14);
  --orange:#F97316; --purple:#8B5CF6;
  --radius:16px; --radius-sm:12px; --radius-xs:10px; --radius-pill:999px;
  --shadow:0 2px 18px rgba(0,0,0,0.38);
  --transition:all 0.28s cubic-bezier(.4,0,.2,1);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
[data-theme="light"] {
  --bg:#FFFFFF; --panel:#FAFBFC; --panel-2:#F1F4F8; --panel-3:#E8EDF5; --line:#E2E8F0;
  --grad:linear-gradient(135deg,#22D3EE 0%,#3B82F6 100%);
  --grad-glow:rgba(34,211,238,0.25);
  --accent:#0369A1; --accent-bright:#0284C7; --accent-dim:rgba(3,105,161,0.08);
  --text:#0F172A; --text-dim:rgba(15,23,42,0.65); --muted:#64748B;
  --green:#059669; --green-dim:rgba(5,150,105,0.10);
  --red:#DC2626; --red-dim:rgba(220,38,38,0.10);
  --orange:#EA580C; --purple:#7C3AED;
  --shadow:0 1px 10px rgba(15,23,42,0.07),0 4px 18px rgba(15,23,42,0.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;min-height:100vh;transition:background .35s,color .35s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(34,211,238,0.05) 0%,transparent 70%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(59,130,246,0.04) 0%,transparent 70%);}
[data-theme="light"] body::before{display:none;}

.topbar{position:sticky;top:0;z-index:100;background:rgba(13,27,46,0.92);border-bottom:1px solid var(--line);
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);}
[data-theme="light"] .topbar{background:#FFFFFF;border-bottom-color:#E2E8F0;box-shadow:0 1px 12px rgba(15,23,42,0.08);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.app-logo{width:34px;height:34px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;box-shadow:0 2px 16px var(--grad-glow);transition:var(--transition);}
.app-name{font-size:16px;color:var(--accent);letter-spacing:.06em;font-weight:700;}
.app-sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;line-height:1;}
.icon-btn{width:36px;height:36px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:var(--transition);}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

.wrap{max-width:560px;margin:0 auto;padding:20px 16px 60px;}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:14px;
  box-shadow:var(--shadow);animation:cardIn .55s cubic-bezier(.16,1,.3,1) both;}
[data-theme="light"] .card{background:#FFFFFF;border-color:#E2E8F0;box-shadow:0 1px 8px rgba(15,23,42,0.06),0 4px 16px rgba(15,23,42,0.04);}

.section-title{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin:0 0 10px;
  display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

.inp{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;
  color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.inp::placeholder{color:var(--muted);}
[data-theme="light"] .inp{background:#FFFFFF;border-color:#CBD5E1;color:#0F172A;}
textarea.inp{resize:vertical;min-height:160px;line-height:1.6;}

.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--grad);color:#FFFFFF;
  border:none;border-radius:var(--radius-pill);padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:transform .15s,box-shadow .2s,filter .15s;letter-spacing:.02em;flex:1;min-width:160px;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 8px 28px var(--grad-glow);filter:brightness(1.06);}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{opacity:.5;cursor:default;transform:none;}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--panel-2);color:var(--text-dim);
  border:1px solid var(--line);border-radius:var(--radius-pill);padding:12px 18px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:var(--transition);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent-bright);transform:translateY(-2px);}
.btn-sm{display:inline-flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);
  border-radius:var(--radius-pill);padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text);font-family:var(--font);
  transition:all .2s cubic-bezier(.4,0,.2,1);}
.btn-sm:hover{border-color:var(--accent);color:var(--accent-bright);transform:translateY(-2px);}
.btn-sm:active{transform:scale(.95);}

.result-card{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:18px;
  margin-top:10px;font-size:14.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both;}
.result-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px;}
.result-label{font-size:12px;color:var(--accent-bright);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.result-head-right{display:flex;align-items:center;gap:10px;}
.result-tag{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.delete-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:6px;transition:var(--transition);}
.delete-btn:hover{color:var(--red);background:var(--red-dim);}

.loading-box{text-align:center;padding:30px 20px;color:var(--accent);}
.spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:#22D3EE;border-right-color:#3B82F6;
  border-radius:50%;animation:spin .8s cubic-bezier(.5,.1,.5,.9) infinite,pulseGlow 1.6s ease-in-out infinite;margin:0 auto 10px;}
.loading-box .lbl{font-size:13px;color:var(--muted);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-3);
  border:1px solid var(--line);color:var(--text);border-radius:var(--radius-sm);padding:12px 22px;font-size:14px;font-weight:600;
  z-index:999;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:var(--shadow);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty-hint{font-size:13px;color:var(--muted);text-align:center;padding:6px 0 2px;}

@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.982);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 6px var(--grad-glow);}50%{box-shadow:0 0 18px var(--grad-glow);}}
/* ===== SETTINGS MODAL / API CONFIG ===== */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
.settings-overlay.open{display:flex;}
.settings-modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);max-width:520px;width:100%;padding:22px;box-shadow:var(--shadow);}
.settings-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.settings-modal-title{font-size:16px;font-weight:700;}
.settings-modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.provider-row{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line);}
.provider-row:last-child{border-bottom:none;}
.provider-label{font-size:13px;font-weight:700;margin-bottom:6px;}
.apikey-field-wrap{position:relative;display:flex;align-items:center;}
.apikey-field{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 40px 10px 12px;color:var(--text);font-size:13px;font-family:var(--font);}
.apikey-eye{position:absolute;right:8px;background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);}
.apikey-status-row{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--muted);}
.apikey-status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.apikey-status-dot.has-key{background:var(--green);}
.apikey-status-dot.testing{background:var(--accent);animation:apikeyPulse 0.9s ease-in-out infinite;}
.apikey-status-dot.error{background:var(--red);}
@keyframes apikeyPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.apikey-btns{display:flex;gap:8px;margin-top:8px;}
.btn-save-key,.btn-test-key,.btn-del-key{font-size:12px;padding:7px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);cursor:pointer;}
.btn-save-key:hover{border-color:var(--accent);color:var(--accent);}
.btn-test-key:hover{border-color:var(--accent);color:var(--accent);}
.btn-del-key:hover{border-color:var(--red);color:var(--red);}
.settings-close-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;margin-top:8px;width:100%;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="app-logo">⚡</div>
    <div>
      <div class="app-name">Nexus Flash</div>
      <div class="app-sub">Análisis y acciones rápidas</div>
    </div>
  </div>
  <button class="icon-btn" id="settingsBtn" onclick="openSettings()" title="Configuración">⚙️</button>
  <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-modal">
    <div class="settings-modal-head">
      <div class="settings-modal-title">⚙️ Configuración · APIs de IA</div>
    </div>
    <div class="settings-modal-sub">Configura una o varias. Se usa la primera disponible y si falla se pasa automáticamente a la siguiente.</div>
    <div id="apiProvidersList"></div>
    <button class="settings-close-btn" onclick="closeSettings()">Cerrar</button>
  </div>
</div>

<div class="wrap">

  <div class="card">
    <div class="section-title">Situación actual</div>
    <textarea class="inp" id="situacion" placeholder="Describe el comentario del cliente o la situación actual del proceso de venta…"></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="btnPasos" onclick="ejecutar('pasos')">🎯 Siguientes pasos</button>
      <button class="btn-primary" id="btnMsg" onclick="ejecutar('mensaje')">✍️ Redactar mensaje</button>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="limpiarTexto()" style="flex:1;">🔄 Nueva consulta</button>
      <button class="btn-ghost" onclick="limpiarFormulario()" style="flex:1;">🗑️ Borrar datos</button>
    </div>
  </div>

  <div id="resultados"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIGURACIÓN MULTI-IA (Claude / Gemini / ChatGPT / Grok con fallback) ────
const CFG_STORAGE_KEY = 'nexusflash_cfg';
const CFG = { claude:'', gemini:'', chatgpt:'', grok:'' };
function cfgLoad(){ try{ const c=localStorage.getItem(CFG_STORAGE_KEY); if(c) Object.assign(CFG, JSON.parse(c)); }catch(e){} }
function cfgSaveLocal(){ try{ localStorage.setItem(CFG_STORAGE_KEY, JSON.stringify(CFG)); }catch(e){} }
const API_KEY_RULES = {
  claude:  v => v.trim().length > 0,
  gemini:  v => v.trim().length > 0,
  chatgpt: v => v.trim().length > 0,
  grok:    v => v.trim().length > 0,
};
function cfgValidateKey(provider, value){ if(!value) return null; const r=API_KEY_RULES[provider]; return r?r(value):true; }
const CLAUDE_MODELS  = ['claude-sonnet-5','claude-haiku-4-5-20251001'];
const GEMINI_MODELS  = ['gemini-2.5-flash','gemini-2.0-flash'];
const CHATGPT_MODELS = ['gpt-4o-mini','gpt-4.1-mini','gpt-3.5-turbo'];
const GROK_MODELS    = ['grok-3-mini','grok-2-latest','grok-beta'];

async function _fetchWithRetry(url, opts, maxRetries=2){
  for(let attempt=0; attempt<=maxRetries; attempt++){
    let res;
    try{ res = await fetch(url, opts); }
    catch(e){
      if(attempt===maxRetries) return { error:'NETWORK', message:'Error de red' };
      await new Promise(r=>setTimeout(r, Math.pow(2,attempt)*5000)); continue;
    }
    if(res.status===429){
      if(attempt===maxRetries) return { error:'RATE_LIMIT', message:'Límite de peticiones alcanzado' };
      const ra=res.headers.get('Retry-After');
      await new Promise(r=>setTimeout(r, ra?parseInt(ra)*1000:Math.pow(2,attempt)*5000));
      continue;
    }
    return { res };
  }
}
async function callClaudeAI(messages, system, opts={}){
  if(!CFG.claude) return { error:'NO_KEY', message:'Falta la API Key de Claude' };
  for(const model of (opts.models||CLAUDE_MODELS)){
    const body = { model, max_tokens:opts.maxTokens||1000, messages };
    if(system) body.system = system;
    const r = await _fetchWithRetry('https://api.anthropic.com/v1/messages', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-api-key':CFG.claude, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' }, body:JSON.stringify(body) }, opts.maxRetries);
    if(r.error){ if(r.error==='RATE_LIMIT') continue; return r; }
    const res=r.res;
    if(res.status===401) return { error:'INVALID_KEY', message:'API Key de Claude inválida' };
    if(res.status===404||res.status===429) continue;
    if(!res.ok) return { error:'HTTP_'+res.status, message:'Error HTTP '+res.status };
    let data; try{ data=await res.json(); }catch(e){ return { error:'EMPTY', message:'Respuesta vacía' }; }
    const text=(data.content||[]).map(b=>b.text||'').join('\n').trim();
    if(!text) return { error:'EMPTY', message:'Respuesta vacía' };
    return { ok:true, text, label:'Claude' };
  }
  return { error:'NO_MODEL', message:'Ningún modelo de Claude disponible' };
}
async function callGeminiAI(messages, system, opts={}){
  if(!CFG.gemini) return { error:'NO_KEY', message:'Falta la API Key de Gemini' };
  const contents = messages.map(m=>({ role: m.role==='assistant'?'model':'user', parts:[{ text:m.content }] }));
  for(const model of (opts.models||GEMINI_MODELS)){
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${CFG.gemini}`;
    const body = { contents, generationConfig:{ maxOutputTokens: opts.maxTokens||1000 } };
    if(system) body.systemInstruction = { parts:[{ text:system }] };
    const r = await _fetchWithRetry(url, { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify(body) }, opts.maxRetries);
    if(r.error){ if(r.error==='RATE_LIMIT') continue; return r; }
    const res=r.res;
    if(res.status===400||res.status===403) return { error:'INVALID_KEY', message:'API Key de Gemini inválida' };
    if(res.status===404||res.status===429) continue;
    if(!res.ok) return { error:'HTTP_'+res.status, message:'Error HTTP '+res.status };
    let data; try{ data=await res.json(); }catch(e){ return { error:'EMPTY', message:'Respuesta vacía' }; }
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!text) return { error:'EMPTY', message:'Respuesta vacía' };
    return { ok:true, text, label:'Gemini' };
  }
  return { error:'NO_MODEL', message:'Ningún modelo de Gemini disponible' };
}
async function _callOpenAICompatibleAI(messages, system, apiKey, models, endpoint, label, opts={}){
  if(!apiKey) return { error:'NO_KEY', message:`Falta la API Key de ${label}` };
  const msgs = system ? [{ role:'system', content:system }, ...messages] : messages;
  for(const model of models){
    const r = await _fetchWithRetry(endpoint, { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey }, body:JSON.stringify({ model, messages:msgs, max_tokens:opts.maxTokens||1000 }) }, opts.maxRetries);
    if(r.error){ if(r.error==='RATE_LIMIT') continue; return r; }
    const res=r.res;
    if(res.status===401) return { error:'INVALID_KEY', message:`API Key de ${label} inválida` };
    if(res.status===404||res.status===429) continue;
    if(!res.ok) return { error:'HTTP_'+res.status, message:'Error HTTP '+res.status };
    let data; try{ data=await res.json(); }catch(e){ return { error:'EMPTY', message:'Respuesta vacía' }; }
    const text = data?.choices?.[0]?.message?.content;
    if(!text) return { error:'EMPTY', message:'Respuesta vacía' };
    return { ok:true, text, label };
  }
  return { error:'NO_MODEL', message:`Ningún modelo de ${label} disponible` };
}
const callChatGPTAI = (messages, system, opts={}) => _callOpenAICompatibleAI(messages, system, CFG.chatgpt, opts.models||CHATGPT_MODELS, 'https://api.openai.com/v1/chat/completions', 'ChatGPT', opts);
const callGrokAI    = (messages, system, opts={}) => _callOpenAICompatibleAI(messages, system, CFG.grok, opts.models||GROK_MODELS, 'https://api.x.ai/v1/chat/completions', 'Grok', opts);
async function callAI(messages, system, opts={}){
  const providers=[];
  if(CFG.claude)  providers.push(()=>callClaudeAI(messages,system,opts));
  if(CFG.gemini)  providers.push(()=>callGeminiAI(messages,system,opts));
  if(CFG.chatgpt) providers.push(()=>callChatGPTAI(messages,system,opts));
  if(CFG.grok)    providers.push(()=>callGrokAI(messages,system,opts));
  if(!providers.length) return { error:'NO_KEY', message:'No hay ninguna API Key configurada. Ve a ⚙️ Configuración.' };
  let last=null;
  for(const fn of providers){ const r=await fn(); if(r.ok) return r; last=r; }
  return last || { error:'NO_MODEL', message:'Ningún proveedor respondió' };
}

// ─── UI de Configuración ────────────────────────────────────────────────────
const AI_PROVIDERS_META = [
  { id:'claude',  label:'Claude (Anthropic)', placeholder:'sk-ant-api03-...', help:'console.anthropic.com/settings/keys' },
  { id:'gemini',  label:'Gemini (Google)',    placeholder:'AIza...',          help:'aistudio.google.com/apikey' },
  { id:'chatgpt', label:'ChatGPT (OpenAI)',   placeholder:'sk-...',           help:'platform.openai.com/api-keys' },
  { id:'grok',    label:'Grok (xAI)',         placeholder:'xai-...',          help:'console.x.ai' },
];
// Verificación REAL de conexión: llamada mínima real a cada API.
// Un 429/cuota se reporta como "clave válida"; solo 401/403 se trata como clave inválida.
async function testApiKeyConnection(providerId, key){
  const testPrompt = 'Responde únicamente con la palabra OK.';
  let r;
  try{
    if(providerId==='claude'){
      r = await fetch('https://api.anthropic.com/v1/messages', { method:'POST',
        headers:{ 'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':key },
        body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:10, messages:[{role:'user',content:testPrompt}] }) });
    } else if(providerId==='gemini'){
      r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, { method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ contents:[{parts:[{text:testPrompt}]}], generationConfig:{maxOutputTokens:10} }) });
    } else if(providerId==='chatgpt'){
      r = await fetch('https://api.openai.com/v1/chat/completions', { method:'POST',
        headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+key },
        body: JSON.stringify({ model:'gpt-4o-mini', max_tokens:10, messages:[{role:'user',content:testPrompt}] }) });
    } else if(providerId==='grok'){
      r = await fetch('https://api.x.ai/v1/chat/completions', { method:'POST',
        headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+key },
        body: JSON.stringify({ model:'grok-3-mini', max_tokens:10, messages:[{role:'user',content:testPrompt}] }) });
    } else { return { ok:false, message:'Proveedor desconocido' }; }
  }catch(e){ return { ok:false, message:'No se pudo conectar (red sin conexión o bloqueo CORS del navegador)' }; }
  if(r.status===401||r.status===403) return { ok:false, message:'Clave inválida o sin permisos (401/403)' };
  if(r.status===429) return { ok:false, message:'Límite de solicitudes alcanzado — la clave sí es válida' };
  if(r.status===404) return { ok:false, message:'Modelo no disponible para esta clave (404)' };
  if(!r.ok){
    let msg='HTTP '+r.status;
    try{ const e=await r.json(); msg=e?.error?.message||e?.message||msg; }catch(_){}
    if(/quota|credit|insufficient|billing/i.test(msg)) return { ok:false, message:'Sin crédito/cuota disponible — la clave sí es válida ('+msg+')' };
    return { ok:false, message:msg };
  }
  return { ok:true, message:'Conexión verificada correctamente ✅' };
}
function renderApiProvidersUI(){
  const list = document.getElementById('apiProvidersList');
  if(!list) return;
  list.innerHTML = AI_PROVIDERS_META.map(p => `
    <div class="provider-row">
      <div class="provider-label">${p.label}</div>
      <div class="apikey-field-wrap">
        <input class="apikey-field" id="apikey-input-${p.id}" type="password" placeholder="${p.placeholder}" autocomplete="off" spellcheck="false" />
        <button class="apikey-eye" data-eye="${p.id}" type="button">👁</button>
      </div>
      <div class="apikey-status-row">
        <div class="apikey-status-dot" id="apikey-dot-${p.id}"></div>
        <span id="apikey-status-text-${p.id}">Sin clave</span>
      </div>
      <div class="apikey-btns">
        <button class="btn-save-key" data-save="${p.id}" type="button">💾 Guardar</button>
        <button class="btn-test-key" data-test="${p.id}" type="button">🧪 Probar</button>
        <button class="btn-del-key" data-del="${p.id}" type="button">🗑 Borrar</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">Obtén tu clave en <strong>${p.help}</strong></div>
    </div>
  `).join('');
  AI_PROVIDERS_META.forEach(p => {
    const saved = CFG[p.id];
    const dot = document.getElementById('apikey-dot-'+p.id);
    const txt = document.getElementById('apikey-status-text-'+p.id);
    const inp = document.getElementById('apikey-input-'+p.id);
    if(saved){ dot.classList.add('has-key'); txt.textContent='✓ Clave guardada'; inp.value=saved; }
    else { dot.classList.remove('has-key'); txt.textContent='Sin clave configurada'; inp.value=''; }
    list.querySelector(`[data-eye="${p.id}"]`).addEventListener('click', () => { inp.type = inp.type==='password' ? 'text' : 'password'; });
    list.querySelector(`[data-save="${p.id}"]`).addEventListener('click', async () => {
      const val = inp.value.trim();
      if(!val){ showToast('Ingresa una API key primero'); return; }
      if(cfgValidateKey(p.id, val) === false){ showToast('⚠️ Formato de clave no reconocido para ' + p.label); }
      CFG[p.id] = val; cfgSaveLocal(); renderApiProvidersUI();
      showToast('✓ API Key de ' + p.label + ' guardada, verificando conexión…');
      const dot2=document.getElementById('apikey-dot-'+p.id), txt2=document.getElementById('apikey-status-text-'+p.id);
      if(dot2){ dot2.classList.remove('has-key','error'); dot2.classList.add('testing'); }
      if(txt2) txt2.textContent='🔄 Verificando conexión…';
      const result = await testApiKeyConnection(p.id, val);
      if(dot2) dot2.classList.remove('testing');
      if(result.ok){ if(dot2){ dot2.classList.remove('error'); dot2.classList.add('has-key'); } if(txt2) txt2.textContent='✓ Conectado'; showToast(`✓ Conexión con ${p.label} verificada`); }
      else{ if(dot2){ dot2.classList.remove('has-key'); dot2.classList.add('error'); } if(txt2) txt2.textContent='✗ '+result.message; showToast(`⚠️ Clave guardada, pero la conexión con ${p.label} falló`); }
    });
    list.querySelector(`[data-test="${p.id}"]`).addEventListener('click', async () => {
      const val = inp.value.trim() || CFG[p.id];
      if(!val){ showToast('Ingresa una API key primero'); return; }
      const dot2=document.getElementById('apikey-dot-'+p.id), txt2=document.getElementById('apikey-status-text-'+p.id);
      if(dot2){ dot2.classList.remove('has-key','error'); dot2.classList.add('testing'); }
      if(txt2) txt2.textContent='🔄 Verificando conexión…';
      const result = await testApiKeyConnection(p.id, val);
      if(dot2) dot2.classList.remove('testing');
      if(result.ok){ if(dot2){ dot2.classList.remove('error'); if(CFG[p.id]) dot2.classList.add('has-key'); } if(txt2) txt2.textContent='✓ '+result.message; showToast(`✓ Conexión con ${p.label} funcionando`); }
      else{ if(dot2){ dot2.classList.remove('has-key'); dot2.classList.add('error'); } if(txt2) txt2.textContent='✗ '+result.message; showToast(`✗ Falló la conexión con ${p.label}`); }
    });
    list.querySelector(`[data-del="${p.id}"]`).addEventListener('click', () => {
      CFG[p.id] = ''; cfgSaveLocal(); renderApiProvidersUI();
      showToast('Clave de ' + p.label + ' borrada');
    });
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function copiarTexto(id, btn){
  const text = document.getElementById(id).innerText;
  const original = btn.textContent;

  function marcarCopiado(){
    btn.textContent = '✅ Copiado';
    setTimeout(()=>btn.textContent = original, 1500);
  }

  function fallbackCopy(){
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      marcarCopiado();
    }catch(e){
      showToast('⚠️ No se pudo copiar');
    }
  }

  if(navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext){
    navigator.clipboard.writeText(text).then(marcarCopiado).catch(fallbackCopy);
  }else{
    fallbackCopy();
  }
}

let consultaActual = 1;
let ultimoTextoConsulta = '';

function limpiarTexto(){
  document.getElementById('situacion').value = '';
  document.getElementById('situacion').focus();
  if(document.getElementById('resultados').children.length){
    consultaActual++;
  }
  ultimoTextoConsulta = '';
  showToast('🔄 Nueva consulta, resultados conservados');
}

function limpiarFormulario(){
  document.getElementById('situacion').value = '';
  document.getElementById('resultados').innerHTML = '';
  consultaActual = 1;
  ultimoTextoConsulta = '';
  document.getElementById('situacion').focus();
  showToast('🗑️ Datos borrados');
}

const PROMPTS = {
  pasos: `Eres un asistente experto en ventas. A partir del siguiente texto que describe un comentario de cliente o la situación actual de un proceso de venta, entrega ÚNICAMENTE una lista breve y práctica de los próximos pasos inmediatos a seguir. No agregues análisis, contexto adicional, introducciones ni conclusiones. Usa frases cortas y accionables, una por línea, con un guion al inicio. Adapta los pasos exactamente a la situación descrita. Responde en español.

Situación:
"""
{TEXTO}
"""`,
  mensaje: `Eres un asistente experto en ventas. A partir del siguiente texto que describe un comentario de cliente o la situación actual de un proceso de venta, redacta el siguiente mensaje que se debería enviar al cliente o prospecto. El mensaje debe estar listo para copiar y enviar tal cual (sin placeholders, sin instrucciones, sin comentarios extra), debe ser natural, profesional y adaptado al contexto y objetivo de la gestión. Responde solo con el mensaje, en español.

Situación:
"""
{TEXTO}
"""`
};

function actualizarEtiquetasConsulta(tipo){
  const cont = document.getElementById('resultados');
  const cards = Array.from(cont.querySelectorAll('[data-tipo="' + tipo + '"]'));
  // El orden de las etiquetas debe basarse en el número cronológico de
  // consulta (orden real en que se generaron), no en la posición visual
  // dentro del DOM (que está invertida: la más reciente aparece arriba).
  const orden = [];
  cards.forEach(c => {
    if(!orden.includes(c.dataset.consulta)) orden.push(c.dataset.consulta);
  });
  orden.sort((a, b) => Number(a) - Number(b));
  cards.forEach(c => {
    const tagEl = c.querySelector('.result-tag');
    if(!tagEl) return;
    if(orden.length <= 1){
      tagEl.textContent = '';
      return;
    }
    const idx = orden.indexOf(c.dataset.consulta) + 1;
    tagEl.textContent = tipo === 'pasos' ? ('Pasos ' + idx) : ('Mensaje ' + idx);
  });
}

function eliminarTarjeta(btn, tipo){
  const card = btn.closest('.card');
  if(card) card.remove();
  actualizarEtiquetasConsulta(tipo);
  showToast('🗑️ Tarjeta eliminada');
}

async function ejecutar(tipo){
  const texto = document.getElementById('situacion').value.trim();
  if(!texto){
    showToast('⚠️ Escribe la situación primero');
    return;
  }

  // Si el texto de la situación cambió respecto a la última consulta generada,
  // se trata automáticamente como una consulta nueva (sin depender de que se
  // presione el botón "Nueva consulta").
  if(texto !== ultimoTextoConsulta){
    if(document.getElementById('resultados').children.length){
      consultaActual++;
    }
    ultimoTextoConsulta = texto;
  }

  document.getElementById('btnPasos').disabled = true;
  document.getElementById('btnMsg').disabled = true;

  const resId = 'res_' + tipo + '_' + Date.now();
  const label = tipo === 'pasos' ? '🎯 Siguientes pasos' : '✍️ Mensaje sugerido';
  const loadingId = 'load_' + Date.now();

  const cont = document.getElementById('resultados');
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.tipo = tipo;
  card.dataset.consulta = consultaActual;
  card.innerHTML = `
    <div class="result-head">
      <span class="result-label">${label}</span>
      <div class="result-head-right">
        <span class="result-tag"></span>
        <button class="delete-btn" onclick="eliminarTarjeta(this,'${tipo}')" title="Eliminar">🗑️</button>
      </div>
    </div>
    <div id="${loadingId}" class="loading-box">
      <div class="spinner"></div>
      <div class="lbl">Analizando…</div>
    </div>
  `;

  // Las tarjetas se agrupan por consulta. Dentro de un mismo grupo, los
  // mensajes siempre quedan por encima de los siguientes pasos. Un grupo
  // nuevo (consulta nueva) siempre se coloca por encima de todo lo anterior.
  const grupoCards = cont.querySelectorAll('[data-consulta="' + consultaActual + '"]');
  if(grupoCards.length === 0){
    // Consulta nueva: va arriba de todo
    cont.insertBefore(card, cont.firstChild);
  } else if(tipo === 'mensaje'){
    // El mensaje siempre va arriba del resto del grupo (incluidos otros mensajes)
    cont.insertBefore(card, grupoCards[0]);
  } else {
    // Los pasos se agregan al final del grupo, debajo de los mensajes
    grupoCards[grupoCards.length - 1].insertAdjacentElement('afterend', card);
  }

  actualizarEtiquetasConsulta(tipo);
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try{
    const prompt = PROMPTS[tipo].replace('{TEXTO}', texto);
    const r = await callAI([{ role:'user', content: prompt }], null, { maxTokens: 1000 });
    if(!r.ok) throw new Error(r.message || 'Error de IA');
    const text = r.text;

    document.getElementById(loadingId).outerHTML = `
      <div class="result-card" id="${resId}">${text.replace(/</g,'&lt;')}</div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn-sm" onclick="copiarTexto('${resId}', this)">📋 Copiar</button>
      </div>
    `;
  }catch(err){
    document.getElementById(loadingId).outerHTML = `<div class="result-card" style="color:var(--red);">${err.message && err.message.includes('API Key') ? err.message : 'Ocurrió un error al generar la respuesta. Intenta nuevamente.'}</div>`;
  }finally{
    document.getElementById('btnPasos').disabled = false;
    document.getElementById('btnMsg').disabled = false;
  }
}
